name: Mutation Testing

on:
  schedule:
    # Mondays 04:00 UTC — non-blocking, periodic.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stryker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x.x

      - name: Restore
        run: dotnet restore Shopizy.sln

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build src/Shopizy.Domain/Shopizy.Domain.csproj --no-restore --configuration Release

      - name: Run Stryker (Domain)
        run: dotnet stryker --config-file stryker-config.json --output StrykerOutput
        continue-on-error: true

      - name: Upload Stryker report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: stryker-report
          path: StrykerOutput/**/reports/mutation-report.html
          retention-days: 30
